backend:
  name: github
  repo: covenantOS/slp-league
  branch: main

# A point event commits to src/data/events.json and the site rebuilds.
collections:
  - name: scoring
    label: Scoring
    files:
      - name: events
        label: Point log
        file: src/data/events.json
        description: Add a point event. Positive points earn, negative points penalize.
        fields:
          - name: events
            label: Events
            label_singular: Event
            widget: list
            summary: '{{fields.date}} · {{fields.playerId}} · {{fields.points}} — {{fields.reason}}'
            fields:
              - { name: date, label: Date, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, picker_utc: true }
              - name: playerId
                label: Player
                widget: select
                options:
                  - { label: Miggy, value: miggy }
                  - { label: Daniboy, value: daniboy }
                  - { label: Kdawg, value: kdawg }
              - name: category
                label: Category
                widget: select
                options:
                  - { label: 'Daily check-in (+3)', value: checkin }
                  - { label: 'Proof of work (+10)', value: proof_of_work }
                  - { label: 'Hit a deadline (+10)', value: deadline }
                  - { label: 'Weekly report on time (+15)', value: weekly_report }
                  - { label: 'Flag a blocker in 24h (+20)', value: flag_blocker }
                  - { label: 'Initiative (+25)', value: initiative }
                  - { label: 'Process improvement (+40)', value: improvement }
                  - { label: 'Client win (+50)', value: client_win }
                  - { label: 'Client retained / upsold (+75)', value: retention }
                  - { label: 'Missed check-in (-3)', value: missed_checkin }
                  - { label: 'Missed deadline (-10)', value: missed_deadline }
                  - { label: 'Sloppy work / failed QA (-15)', value: sloppy }
                  - { label: 'No tools / no proof (-15)', value: no_tool }
                  - { label: 'Red card (-25)', value: red_card }
              - { name: points, label: Points, widget: number, value_type: int, hint: 'Positive to earn, negative to penalize. Match the category above.' }
              - { name: reason, label: Reason, widget: string }
              - { name: by, label: Awarded by, widget: string, default: William, required: false }
              - { name: id, label: ID, widget: string, required: false, hint: 'Optional. Leave blank for new entries.' }
